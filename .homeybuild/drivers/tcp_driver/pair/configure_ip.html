<style type="text/css">
    .input-wrap label {
        display: block;
        margin-top: 12px;
    }

    .ip-scan-err-msg {
        color: #ff6300;
    }
</style>

<script type="text/javascript">
    async function configure()
    {
        const errorElement = document.querySelector('.ip-scan-err-msg');
        const ipAddress = document.getElementById('ip_address').value.trim();
        const enteredName = document.getElementById('name').value.trim();
        const tcpPort = Number(document.getElementById('tcp_port').value);
        errorElement.textContent = '';

        if (!ipAddress)
        {
            errorElement.textContent = Homey.__('pair.configuration.host_required');
            return;
        }

        if (!Number.isInteger(tcpPort) || tcpPort <= 0 || tcpPort > 65535)
        {
            errorElement.textContent = Homey.__('pair.configuration.tcp_port_invalid');
            return;
        }

        const device = {
            data: {
                id: 'PortScan-' + Date.now() + '-' + Math.random().toString(16).slice(2),
            },
            name: enteredName || ipAddress + ':' + tcpPort,
            settings: {
                host: ipAddress,
                tcp_port: tcpPort,
            },
        };

        Homey.showLoadingOverlay();
        try
        {
            await Homey.createDevice(device);
            Homey.done();
        }
        catch (err)
        {
            errorElement.textContent = err.message || String(err);
        }
        finally
        {
            Homey.hideLoadingOverlay();
        }
    }
</script>

<p data-i18n="pair.configuration.explanation"></p>
<div class="form-group">
    <span class="input-wrap">
        <label for="name" data-i18n="pair.configuration.name"></label>
        <input type="text" id="name" />

        <label for="ip_address" data-i18n="pair.configuration.ip_address"></label>
        <input type="text" id="ip_address" />

        <label for="tcp_port" data-i18n="pair.configuration.tcp_port"></label>
        <input type="number" id="tcp_port" min="1" max="65535" value="9090" />
    </span>
</div>
<button class="button" id="authentication_button" type="button" onclick="configure();">
    <span data-i18n="pair.configuration.configure"></span>
</button>
<p class="ip-scan-err-msg"></p>
