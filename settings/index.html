<!doctype html>
<html>

<head>
    <link rel="stylesheet" type="text/css" href="lwsa.css">

    <!-- The '/homey.js' script must be included in your settings view to work -->
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
</head>

<body>
    <!-- Tab links -->
    <div class="tab">
        <button class="tablinks" onclick="setPage(event, 'log')" id="defaultOpen">Log</button>
    </div>

    <!-- LOG PAGE -->
    <div id="log" class="tabcontent">
        <fieldset>
            <p> Diagnostics Log
            </p>
            <div class="field row">
                <label for="logLevel"><span data-i18n="settings.logLevel"></span></label>
                <select id="logLevel">
                    <option value=0>Errors Only</option>
                    <option value=1>Basic Information</option>
                </select>
                <p id="logLevelHint" data-i18n="settings.errorsOnlyHint"></p>
                <P></P>
            </div>
        </fieldset>
        <fieldset>
            <p>
                <button id="clearInfoLog" style="background-color:#a5510d;color:white;margin:5px 20px 5px 5px;" data-i18n="settings.clear"></button>
            </p>
            <div class="field row">
                <textarea id="infoLog"></textarea>
            </div>
        </fieldset>
    </div>

    <script type="text/javascript">
        var infoLogElement = document.getElementById('infoLog');
        var logLevelElement = document.getElementById('logLevel');
        var logLevelHintElement = document.getElementById('logLevelHint');
        var clearInfoLogElement = document.getElementById('clearInfoLog');

        function updateLogLevelHint()
        {
            logLevelHintElement.style.display = logLevelElement.value === '0' ? 'block' : 'none';
        }

        // a method named 'onHomeyReady' must be present in your code
        async function onHomeyReady(Homey)
        {
            document.getElementById("defaultOpen").click();

            Homey.on('com.netscan.logupdated', function(data)
            {
                infoLogElement.value = data.log;
            });

            try
            {
                const logLevel = await Homey.get('logLevel');
                logLevelElement.value = logLevel.toString();
                updateLogLevelHint();
                infoLogElement.value = await Homey.api('GET', '/getLog/', {});
            }
            catch (err)
            {
                await Homey.alert(err);
            }

            logLevelElement.addEventListener('change', async function()
            {
                try
                {
                    await Homey.set('logLevel', parseInt(logLevelElement.value, 10));
                    updateLogLevelHint();
                }
                catch (err)
                {
                    await Homey.alert(err);
                }
            });

            clearInfoLogElement.addEventListener('click', async function()
            {
                try
                {
                    await Homey.api('POST', '/clearLog/', {});
                    infoLogElement.value = "";
                }
                catch (err)
                {
                    await Homey.alert(err);
                }
            });

            // Tell Homey we're ready to be displayed
            Homey.ready();
        }

        async function setPage(evt, tabPage)
        {
            var i, tabcontent, tablinks;

            // Get all elements with class="tabcontent" and hide them
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++)
            {
                tabcontent[i].style.display = "none";
            }

            // Get all elements with class="tablinks" and remove the class "active"
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++)
            {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }

            // Show the current tab, and add an "active" class to the button that opened the tab
            document.getElementById(tabPage).style.display = "block";
            evt.currentTarget.className += " active";

            if (tabPage == 'log')
            {
                try
                {
                    logLevelElement.value = await Homey.get('logLevel');
                    updateLogLevelHint();
                }
                catch (err)
                {
                    await Homey.alert(err);
                }

                // Make the log text area fill the page
                infoLogElement.setAttribute('cols', infoLogElement.parentElement.clientWidth / 8);
                infoLogElement.style.height = (window.innerHeight - infoLogElement.offsetTop - 50) + 'px';
            }
        }

    </script>

</body>

</html>
